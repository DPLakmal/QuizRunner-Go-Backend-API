services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=quiz_user
      - POSTGRES_PASSWORD=quiz_password
      - POSTGRES_DB=quiz_db
    volumes:
      - quiz-db-data:/var/lib/postgresql/data
    networks:
      - quiz-network
    restart: unless-stopped

  auth:
  auth:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgresql://quiz_user:quiz_password@db:5432/quiz_db
      - JWT_SECRET=your_jwt_secret_key
      - PORT=8080
    depends_on:
      db:
        condition: service_started
    networks:
      - quiz-network

  user:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - DB_HOST=db
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - PORT=8080
    depends_on:
      db:
        condition: service_started
    networks:
      - quiz-network

  quiz:
    build:
      context: .
      dockerfile: quiz-service/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - PORT=5000
    depends_on:
      db:
        condition: service_started
    networks:
      - quiz-network

  result:
    build:
      context: .
      dockerfile: result-service/Dockerfile
    ports:
      - "5002:5000"
    environment:
      - DATABASE_URL=postgresql://quiz_user:quiz_password@db:5432/quiz_db
      - PORT=5000
    depends_on:
      db:
        condition: service_started
      quiz:
        condition: service_started
    networks:
      - quiz-network

  notification:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=db
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - PORT=5000
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your_email@gmail.com
      - SMTP_PASSWORD=your_email_password
    depends_on:
      db:
        condition: service_started
    networks:
      - quiz-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8083:80"
    environment:
      - AUTH_PORT=8081
    depends_on:
      - auth
      - user
      - quiz
      - result
      - notification
    networks:
      - quiz-network


