services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password
      POSTGRES_DB: quiz_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d quiz_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=db
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - DB_HOST=db
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz-network

  quiz-service:
    build:
      context: .
      dockerfile: quiz-service/Dockerfile
    ports:
      - "8083:8080"
    environment:
      - DB_HOST=db
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz-network

  result-service:
    build:
      context: .
      dockerfile: result-service/Dockerfile
    ports:
      - "8084:8080"
    environment:
      - DB_HOST=db
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "8085:8080"
    environment:
      - DB_HOST=db
      - DB_USER=quiz_user
      - DB_PASSWORD=quiz_password
      - DB_NAME=quiz_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - user-service
      - quiz-service
      - result-service
      - notification-service
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24

volumes:
  postgres_data:
